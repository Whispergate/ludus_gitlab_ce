---
- name: Execute Rails runner payload to instantiate defined groups
  ansible.builtin.shell: >
    gitlab-rails runner "require 'logger'; logger = Logger.new(STDOUT);
    ['{{ gitlab_groups | join(\"', '\") }}'].each do |g|
      path = g.downcase.gsub(/[^a-z0-9]/, '-').squeeze('-').chomp('-')
      if Group.find_by(name: g)
        logger.info \"Group #{g} exists\"
      else
        Group.create!(name: g, path: path, visibility_level: 20)
        logger.info \"Group #{g} created\"
      end
    end"
  when: gitlab_groups | length > 0
  register: rails_output
  changed_when: "'created' in rails_output.stdout"
